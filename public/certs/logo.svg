<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60">
  <!-- EU circle stars -->
  <g transform="translate(30,30)">
    <!-- Arc -->
    <path d="M -22,-18 A 28,28 0 0,1 22,-18" fill="none" stroke="#1E6FD9" stroke-width="3" stroke-linecap="round"/>
    <!-- Plane icon -->
    <g transform="translate(23,-20) rotate(35)">
      <polygon points="0,-4 8,0 0,4 2,0" fill="#1E6FD9"/>
    </g>
    <!-- EU Stars ring -->
    <g fill="#FFD700">
      <circle cx="0" cy="-13" r="1.5"/>
      <circle cx="6.5" cy="-11" r="1.5"/>
      <circle cx="11" cy="-5" r="1.5"/>
      <circle cx="11" cy="2" r="1.5"/>
      <circle cx="6.5" cy="8" r="1.5"/>
      <circle cx="0" cy="10" r="1.5"/>
      <circle cx="-6.5" cy="8" r="1.5"/>
      <circle cx="-11" cy="2" r="1.5"/>
      <circle cx="-11" cy="-5" r="1.5"/>
      <circle cx="-6.5" cy="-11" r="1.5"/>
    </g>
    <!-- Letter E in center -->
    <text x="0" y="5" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="14" fill="#1E6FD9">E</text>
  </g>
  <!-- Text -->
  <text x="68" y="24" font-family="Georgia,serif" font-weight="700" font-size="15" fill="#1a1a2e" letter-spacing="0.3">Easy to</text>
  <text x="68" y="44" font-family="Georgia,serif" font-weight="800" font-size="20" fill="#1E6FD9" letter-spacing="0.5">Europe</text>
</svg>
